<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="אימון נתי">
<title>אימון נתי</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--card:#161616;--card2:#1f1f1f;
  --border:#2a2a2a;--border2:#333;--green:#1db954;--green-dark:#17a349;
  --white:#ffffff;--white2:rgba(255,255,255,0.85);--white3:rgba(255,255,255,0.45);
  --white4:rgba(255,255,255,0.12);--red:#f15152;--orange:#ff9500;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:'Google Sans',sans-serif;color:var(--white);overscroll-behavior:none}

.header{background:var(--bg);padding:20px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:32px;height:32px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:16px;height:16px;fill:#000}
.header-name{font-family:'Google Sans Display',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--white3);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.sheet-btn{padding:8px 14px;border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:500;color:var(--white2);text-decoration:none;letter-spacing:0.2px;background:var(--white4)}
.nav{display:flex;gap:6px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.nav-tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;color:var(--white3);border:1px solid transparent;background:none;cursor:pointer;letter-spacing:0.2px;transition:all 0.2s}
.nav-tab.active{background:var(--white);color:#000;border-color:var(--white)}
.page{display:none;padding:16px 12px 80px}
.page.active{display:block}
.section-label{font-size:11px;font-weight:700;color:var(--white3);text-transform:uppercase;letter-spacing:1px;padding:16px 4px 8px}

.workout-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.workout-header{padding:18px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.workout-tag{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--green);border-radius:10px;font-size:15px;font-weight:700;color:#000;margin-bottom:6px}
.workout-title{font-size:16px;font-weight:700;letter-spacing:-0.2px}
.workout-count{font-size:12px;color:var(--white3);margin-top:2px;letter-spacing:0.2px}
.workout-arrow{width:28px;height:28px;border-radius:50%;background:var(--white4);display:flex;align-items:center;justify-content:center;transition:transform 0.25s,background 0.2s}
.workout-arrow svg{width:12px;height:12px;fill:var(--white);transition:transform 0.25s}
.workout-arrow.open{background:var(--green)}
.workout-arrow.open svg{fill:var(--white);transform:rotate(180deg)}
.workout-body{border-top:1px solid var(--border);display:none}
.workout-body.open{display:block}

.exercise{padding:16px;border-bottom:1px solid var(--border)}
.exercise:last-of-type{border-bottom:none}
.ex-name{font-size:14px;font-weight:700;color:var(--white);margin-bottom:2px;letter-spacing:-0.1px}
.ex-meta{font-size:11px;color:var(--white3);margin-bottom:12px;letter-spacing:0.2px}
.sets-header{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:6px;margin-bottom:6px}
.sets-header span{font-size:10px;color:var(--white3);text-align:center;font-weight:500;text-transform:uppercase;letter-spacing:0.8px}
.set-block{margin-bottom:8px}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 44px;gap:6px;align-items:center}
.set-num{font-size:11px;color:var(--white3);text-align:center;font-weight:700;letter-spacing:0.3px}
.set-input{width:100%;padding:11px 6px;font-size:16px;font-family:'Google Sans',sans-serif;font-weight:500;border:1.5px solid var(--border2);border-radius:var(--radius-sm);text-align:center;background:var(--bg3);color:var(--white);-webkit-appearance:none;transition:border-color 0.2s}
.set-input:focus{outline:none;border-color:var(--green)}
.set-input::placeholder{color:var(--white4)}

.timer-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.timer-btn svg{width:14px;height:14px;fill:var(--white3);transition:fill 0.2s}
.timer-btn:hover{border-color:var(--orange);background:rgba(255,149,0,0.1)}
.timer-btn:hover svg{fill:var(--orange)}
.timer-btn.running{border-color:var(--orange);background:rgba(255,149,0,0.15);animation:pulse 1s ease-in-out infinite}
.timer-btn.running svg{fill:var(--orange)}
.timer-btn.done{border-color:var(--green);background:rgba(29,185,84,0.15)}
.timer-btn.done svg{fill:var(--green)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,149,0,0.3)}50%{box-shadow:0 0 0 6px rgba(255,149,0,0)}}
.timer-bar-wrap{margin-top:6px;display:none;align-items:center;gap:8px;padding:0 2px}
.timer-bar-wrap.visible{display:flex}
.timer-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:var(--orange);border-radius:2px;transition:width 1s linear;width:100%}
.timer-fill.done{background:var(--green)}
.timer-label{font-size:12px;font-weight:700;color:var(--orange);min-width:32px;text-align:center;font-variant-numeric:tabular-nums}
.timer-label.done{color:var(--green)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f1f1f;border:1px solid var(--border2);border-radius:40px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.3s;min-width:200px}
.toast.visible{opacity:1;pointer-events:auto}
.toast-label{font-size:14px;font-weight:700;color:var(--white);font-variant-numeric:tabular-nums}
.toast-sub{font-size:11px;color:var(--white3);margin-top:1px}
.toast-ring{width:36px;height:36px;flex-shrink:0;position:relative}
.toast-ring svg{width:36px;height:36px;transform:rotate(-90deg)}
.toast-ring circle{fill:none;stroke:var(--border2);stroke-width:3}
.toast-ring .progress{stroke:var(--orange);stroke-width:3;stroke-linecap:round;stroke-dasharray:100;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.toast-ring .progress.done{stroke:var(--green)}
.toast-cancel{background:none;border:none;color:var(--white3);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}

.workout-footer{padding:14px 16px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.date-input{flex:1;padding:11px 12px;font-size:14px;font-family:'Google Sans',sans-serif;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--white);-webkit-appearance:none;transition:border-color 0.2s}
.date-input:focus{outline:none;border-color:var(--green)}
.save-btn{padding:11px 20px;background:var(--green);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:'Google Sans',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.2s,transform 0.1s}
.save-btn:active{background:var(--green-dark);transform:scale(0.97)}
.save-btn:disabled{opacity:0.4}
.save-status{font-size:12px;text-align:center;padding:8px 16px;display:none}
.save-ok{color:var(--green)}
.save-err{color:var(--red)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* HISTORY TABS */
.hist-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.hist-tabs::-webkit-scrollbar{display:none}
.hist-tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;color:var(--white3);border:1px solid var(--border2);background:none;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.hist-tab.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.hist-empty{text-align:center;padding:40px 20px;color:var(--white3);font-size:14px}
.hist-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.hist-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-title{font-size:14px;font-weight:700;color:var(--white)}
.hist-date{font-size:11px;color:var(--white3);margin-top:2px}
.hist-body{border-top:1px solid var(--border);padding:12px 16px;display:none}
.hist-body.open{display:block}
.hist-ex{font-size:10px;color:var(--green);padding:6px 0 3px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.hist-cols{display:grid;grid-template-columns:1fr 56px 56px;gap:4px;font-size:10px;color:var(--white3);padding-bottom:4px;text-align:center;letter-spacing:0.5px;text-transform:uppercase}
.hist-cols span:first-child{text-align:right}
.hist-row{display:grid;grid-template-columns:1fr 56px 56px;gap:4px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.hist-row:last-child{border-bottom:none}
.hist-row span{color:var(--white3)}
.hist-row .val{text-align:center;font-weight:700;color:var(--white)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-dot">
        <svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
      </div>
      <div>
        <div class="header-name">נתי</div>
        <div class="header-sub">Workout Tracker</div>
      </div>
    </div>
    <a class="sheet-btn" href="https://docs.google.com/spreadsheets/d/1HM8vFh6DGso3sA66h7kR5QZSL3Gmu6hpVrVKCK6yvaM/edit" target="_blank">Google Sheet ↗</a>
  </div>
  <div class="nav">
    <button class="nav-tab active" onclick="showPage('workouts',this)">אימונים</button>
    <button class="nav-tab" onclick="showPage('history',this)">היסטוריה</button>
  </div>
</div>

<div id="page-workouts" class="page active"></div>
<div id="page-history" class="page"></div>

<div class="toast" id="toast">
  <div class="toast-ring">
    <svg viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9"/>
      <circle class="progress" id="toast-progress" cx="18" cy="18" r="15.9"/>
    </svg>
  </div>
  <div>
    <div class="toast-label" id="toast-label">1:30</div>
    <div class="toast-sub">מנוחה בין סטים</div>
  </div>
  <button class="toast-cancel" onclick="cancelToast()">✕</button>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz2Kt4zRM3qRqqvdD7qXHrSIqt9HIx8GDrF2m6PhE4rIhncHKqUwqOZXfHVgvxOlAk/exec';
const TIMER_SECS=90;

const WORKOUTS=[
  {id:'A',name:'אימון A',exercises:[
    {name:'Back Squat',meta:'מורכב (מוט) · 4×8-10 · מיקוד בטכניקה ועומק',sets:4},
    {name:'כפיפת ברכיים במכונה',meta:'פשוט · 3×12-15 · קצב מבוקר בירידה',sets:3},
    {name:'Bench Press',meta:'מוט/דאמבלים · 4×8-10 · טווח תנועה מלא',sets:4},
    {name:'פשיטת מרפקים',meta:'פולי/דאמבלים · 3×12-15',sets:3},
  ]},
  {id:'B',name:'אימון B',exercises:[
    {name:'Clean',meta:'מוט · 4×8 · ביצוע בתחילת האימון',sets:4},
    {name:'Deadlift',meta:'מוט · 4×8 · גב ניטרלי',sets:4},
    {name:'מתח עם משקל',meta:'4×10',sets:4},
    {name:'כפיפת מרפקים',meta:'פשוט · 3×12-15 · ללא תנופה',sets:3},
  ]},
  {id:'C',name:'אימון C',exercises:[
    {name:"פרונט סקוואט / לאנץ'",meta:'מוט · 3×8 · דגש על ליבה וזקיפות גב',sets:3},
    {name:'RDL — קטלבל',meta:'3×10-12 · המטינגס וישבן',sets:3},
    {name:'מתח עם משקל',meta:'4×10',sets:4},
    {name:'פוש פרס / פרס',meta:'מוט · 4×8 · כוח מתפרץ מהרגליים',sets:4},
    {name:'Bench Press',meta:'פשוט/מורכב · 4×10',sets:4},
  ]},
  {id:'D',name:'אימון D',exercises:[
    {name:"לאנץ' / פרונט סקווט",meta:'דאמבלים/קטלבל · 3×10 · משקולת בכל יד',sets:3},
    {name:'אובר-הד פרס',meta:'מוט/דאמבלים · 4×8-10 · כיווץ ישבן ובטן',sets:4},
    {name:'כפיפת ברכיים במכונה',meta:'פשוט · 3×12-15 · עבודה איטית ומבוקרת',sets:3},
    {name:'כפיפת מרפקים',meta:'פשוט · 3×12-15',sets:3},
  ]}
];

let history=[];
try{history=JSON.parse(localStorage.getItem('nati_hist')||'[]');}catch(e){}
function saveHist(){try{localStorage.setItem('nati_hist',JSON.stringify(history));}catch(e){}}

let activeHistTab='A';

// TIMER
let timerInterval=null,timerRemaining=0,activeTimerBtn=null;

function startTimer(btnId,fillId,labelId){
  if(timerInterval){
    clearInterval(timerInterval);
    if(activeTimerBtn){
      activeTimerBtn.classList.remove('running','done');
      const ob=document.getElementById(activeTimerBtn.dataset.fill);
      if(ob) ob.closest('.timer-bar-wrap').classList.remove('visible');
    }
  }
  const btn=document.getElementById(btnId);
  const fill=document.getElementById(fillId);
  const label=document.getElementById(labelId);
  btn.dataset.fill=fillId; btn.dataset.label=labelId; activeTimerBtn=btn;
  timerRemaining=TIMER_SECS;
  btn.classList.add('running'); btn.classList.remove('done');
  fill.classList.remove('done'); fill.style.width='100%';
  label.classList.remove('done');
  fill.closest('.timer-bar-wrap').classList.add('visible');
  updateToast(timerRemaining,false);
  document.getElementById('toast').classList.add('visible');
  timerInterval=setInterval(()=>{
    timerRemaining--;
    fill.style.width=Math.round((timerRemaining/TIMER_SECS)*100)+'%';
    const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
    label.textContent=m+':'+(s<10?'0':'')+s;
    updateToast(timerRemaining,false);
    if(timerRemaining<=0){
      clearInterval(timerInterval); timerInterval=null;
      btn.classList.remove('running'); btn.classList.add('done');
      fill.classList.add('done'); fill.style.width='0%';
      label.textContent='✓'; label.classList.add('done');
      updateToast(0,true);
      try{const ctx=new AudioContext();[523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.12);});}catch(e){}
      setTimeout(()=>document.getElementById('toast').classList.remove('visible'),2500);
    }
  },1000);
}

function updateToast(remaining,done){
  const pct=(remaining/TIMER_SECS)*100;
  document.getElementById('toast-progress').style.strokeDashoffset=done?100:100-(pct/100)*100;
  document.getElementById('toast-progress').classList.toggle('done',done);
  const m=Math.floor(remaining/60),s=remaining%60;
  document.getElementById('toast-label').textContent=done?'סיום!':m+':'+(s<10?'0':'')+s;
}

function cancelToast(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('toast').classList.remove('visible');
  if(activeTimerBtn){
    activeTimerBtn.classList.remove('running','done');
    const f=document.getElementById(activeTimerBtn.dataset.fill);
    if(f){f.closest('.timer-bar-wrap').classList.remove('visible');f.style.width='100%';f.classList.remove('done');}
    const l=document.getElementById(activeTimerBtn.dataset.label);
    if(l){l.textContent='1:30';l.classList.remove('done');}
    activeTimerBtn=null;
  }
}

function showPage(id,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  tab.classList.add('active');
  if(id==='history') renderHistory();
}

function toggleSection(bodyId,arrowId){
  const body=document.getElementById(bodyId);
  const arrow=document.getElementById(arrowId);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
}

function saveWorkout(wid){
  const w=WORKOUTS.find(x=>x.id===wid);
  const date=document.getElementById('date-'+wid).value;
  const btn=document.getElementById('savebtn-'+wid);
  const okEl=document.getElementById('ok-'+wid);
  const errEl=document.getElementById('err-'+wid);
  okEl.style.display='none'; errEl.style.display='none';

  const rows=[]; const histEx=[];
  w.exercises.forEach((ex,ei)=>{
    const hSets=[];
    for(let s=1;s<=ex.sets;s++){
      const reps=document.querySelector(`input[data-w="${wid}"][data-e="${ei}"][data-s="${s}"][data-t="reps"]`)?.value||'';
      const kg=document.querySelector(`input[data-w="${wid}"][data-e="${ei}"][data-s="${s}"][data-t="kg"]`)?.value||'';
      if(reps||kg){
        // שים לב: שורה ללא עמודת "אימון" כי זה כבר בכרטיסייה
        rows.push([date,ex.name,'סט '+s,reps,kg]);
        hSets.push({s,reps,kg});
      }
    }
    if(hSets.length) histEx.push({name:ex.name,sets:hSets});
  });

  if(!rows.length){errEl.textContent='לא הוזנו נתונים';errEl.style.display='block';return;}
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>שומר...';

  const cbName='cb_'+Date.now();
  const url=SCRIPT_URL+'?workout='+encodeURIComponent(wid)+'&data='+encodeURIComponent(JSON.stringify(rows))+'&callback='+cbName;
  const script=document.createElement('script');
  window[cbName]=function(result){
    delete window[cbName];
    document.body.removeChild(script);
    btn.disabled=false; btn.textContent='שמור';
    if(result.status==='ok'){
      history.unshift({id:wid,name:w.name,date,exercises:histEx});
      saveHist();
      okEl.textContent='✓ נשמר בכרטיסיית אימון '+wid;
      okEl.style.display='block';
      setTimeout(()=>{okEl.style.display='none';},4000);
    } else {
      errEl.textContent='שגיאה בשמירה — נסה שוב';
      errEl.style.display='block';
    }
  };
  script.onerror=function(){
    delete window[cbName];
    document.body.removeChild(script);
    btn.disabled=false; btn.textContent='שמור';
    errEl.textContent='שגיאה בשמירה — נסה שוב';
    errEl.style.display='block';
  };
  script.src=url;
  document.body.appendChild(script);
}

function switchHistTab(tab){
  activeHistTab=tab;
  document.querySelectorAll('.hist-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.tab===tab);
  });
  renderHistContent();
}

function renderHistContent(){
  const filtered=history.filter(h=>h.id===activeHistTab);
  const c=document.getElementById('hist-content');
  if(!filtered.length){
    c.innerHTML='<div class="hist-empty">אין אימונים שמורים עבור אימון '+activeHistTab+'</div>';
    return;
  }
  c.innerHTML=filtered.map((h,hi)=>{
    const uid='h'+activeHistTab+hi;
    return `
    <div class="hist-card">
      <div class="hist-header" onclick="toggleSection('hbody-${uid}','harrow-${uid}')">
        <div><div class="hist-title">${h.date}</div><div class="hist-date">${h.exercises.length} תרגילים · ${h.exercises.reduce((a,e)=>a+e.sets.length,0)} סטים</div></div>
        <div class="workout-arrow" id="harrow-${uid}"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>
      </div>
      <div class="hist-body" id="hbody-${uid}">
        ${h.exercises.map(ex=>`
          <div class="hist-ex">${ex.name}</div>
          <div class="hist-cols"><span>סט</span><span>חזרות</span><span>משקל</span></div>
          ${ex.sets.map(s=>`
            <div class="hist-row"><span>סט ${s.s}</span><span class="val">${s.reps||'—'}</span><span class="val">${s.kg||'—'}</span></div>
          `).join('')}
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const c=document.getElementById('page-history');
  c.innerHTML=`
    <div class="section-label">היסטוריה לפי אימון</div>
    <div class="hist-tabs">
      ${WORKOUTS.map(w=>`<button class="hist-tab${w.id===activeHistTab?' active':''}" data-tab="${w.id}" onclick="switchHistTab('${w.id}')">${w.name}</button>`).join('')}
    </div>
    <div id="hist-content"></div>
  `;
  renderHistContent();
}

function renderWorkouts(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('page-workouts').innerHTML=
    '<div class="section-label">בחר אימון</div>'+
    WORKOUTS.map(w=>`
    <div class="workout-card">
      <div class="workout-header" onclick="toggleSection('body-${w.id}','arrow-${w.id}')">
        <div>
          <div class="workout-tag">${w.id}</div>
          <div class="workout-title">${w.name}</div>
          <div class="workout-count">${w.exercises.length} תרגילים</div>
        </div>
        <div class="workout-arrow" id="arrow-${w.id}">
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
      <div class="workout-body" id="body-${w.id}">
        ${w.exercises.map((ex,ei)=>`
          <div class="exercise">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.meta}</div>
            <div class="sets-header"><span>#</span><span>חזרות</span><span>ק"ג</span><span>מנוחה</span></div>
            ${Array.from({length:ex.sets},(_,i)=>i+1).map(s=>{
              const tid=`t-${w.id}-${ei}-${s}`,fid=`f-${w.id}-${ei}-${s}`,lid=`l-${w.id}-${ei}-${s}`;
              return `<div class="set-block">
                <div class="set-row">
                  <div class="set-num">S${s}</div>
                  <input class="set-input" type="number" inputmode="numeric" min="0" placeholder="—" data-w="${w.id}" data-e="${ei}" data-s="${s}" data-t="reps">
                  <input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" placeholder="—" data-w="${w.id}" data-e="${ei}" data-s="${s}" data-t="kg">
                  <button class="timer-btn" id="${tid}" onclick="startTimer('${tid}','${fid}','${lid}')">
                    <svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
                  </button>
                </div>
                <div class="timer-bar-wrap">
                  <div class="timer-track"><div class="timer-fill" id="${fid}"></div></div>
                  <div class="timer-label" id="${lid}">1:30</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        `).join('')}
        <div class="workout-footer">
          <input type="date" class="date-input" id="date-${w.id}" value="${today}">
          <button class="save-btn" id="savebtn-${w.id}" onclick="saveWorkout('${w.id}')">שמור</button>
        </div>
        <div class="save-status save-ok" id="ok-${w.id}"></div>
        <div class="save-status save-err" id="err-${w.id}"></div>
      </div>
    </div>
  `).join('');
}

renderWorkouts();
</script>
</body>
</html>
